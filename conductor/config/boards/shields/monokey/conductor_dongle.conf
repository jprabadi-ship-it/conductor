# --- 基本システム設定 ---
CONFIG_ZMK_KEYBOARD_NAME="conductor"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# --- 接続・通信設定 ---
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- 分割キーボード間のステータス共有 ---
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- マウス・ポインティング機能 (最優先) ---
# 新しいPointing機能を有効化し、古いMouse設定と共存させて互換性を確保
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_MOUSE=y

# --- パフォーマンス・安定性向上 ---
# 負荷軽減のためStudioとロギングは一旦オフ（必要時にyに戻してください）
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_USB_LOGGING=n

# LEDピンとの競合を防ぐための無効化設定
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_GPIO=y

# （既存のバッファ設定はそのまま残します）
CONFIG_BT_BUF_ACL_TX_COUNT=30
CONFIG_BT_BUF_EVT_RX_COUNT=35
CONFIG_BT_L2CAP_TX_MTU=247

# --- 🌟 バックライト基本有効化 ---
CONFIG_ZMK_BACKLIGHT=y
CONFIG_LED=y
CONFIG_LED_PWM=y
CONFIG_PWM=y

# 1. 起動時に点灯
CONFIG_ZMK_BACKLIGHT_BRT_START=100

# 2. 自動消灯（アイドルタイマー）を有効化
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y

# 3. 🌟 1秒で消すための「システム全体」のアイドル設定
# 未定義エラーを回避しつつ、ドングルを挿して1秒でLEDを消します
CONFIG_ZMK_IDLE_TIMEOUT=1000

# 通信最適化
# 通信間隔の最小値 最短は6 (7.5ms) (6)
# CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
# 通信間隔の最大値 最短は12 (15ms)(12)
# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
# スレーブレーテンシ データがない時は通信をサボる（スキップする）(30回（15ms × 30回 ＝ 約0.45秒）)
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
# タイムアウト時間（単位は10ms） 400なら4秒(400)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
