CONFIG_ZMK_BLE=y

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
CONFIG_ZMK_INPUT_SPLIT=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# バッテリー状態のレポートを有効化
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60
CONFIG_BT_BAS=y

# 通信最適化
# CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# --- 基本機能 ---
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

# --- 🌟 バックライト機能（スレイブ側） ---
CONFIG_ZMK_BACKLIGHT=y
CONFIG_LED=y
CONFIG_LED_PWM=y
CONFIG_PWM=y

# 1. 起動時に点灯
CONFIG_ZMK_BACKLIGHT_BRT_START=100

# 2. 自動消灯を有効
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y

# 3. 1秒 (1000ms) で消灯
# スレイブ側もこれで電源ONから1秒後にスッと消えます
CONFIG_ZMK_IDLE_TIMEOUT=1000

# バッテリ報告と通知機能を有効化
# CONFIG_ZMK_BACKLIGHT_LOW_BAT_INDICATE=y

# 10%以下になったら点滅させる（通知のしきい値）
# CONFIG_ZMK_BACKLIGHT_LOW_BAT_PCT=10

# 通信最適化
# 通信間隔の最小値 最短は6 (7.5ms) (6)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
# 通信間隔の最大値 最短は12 (15ms)(12)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
# スレーブレーテンシ データがない時は通信をサボる（スキップする）(30回（15ms × 30回 ＝ 約0.45秒）)
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# タイムアウト時間（単位は10ms） 400なら4秒(400)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# スリープからの復帰時に接続をより積極的に試みる設定
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
