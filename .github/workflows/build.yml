on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ZMK Firmwares
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. ドングル (conductor_dongle) のビルド
      - name: Build Dongle
        uses: zmkfirmware/zmk-build-action@v2
        with:
          board: xiao_ble
          shield: conductor_dongle
          # ここで「門番」を介さず直接ビルドします

      # 2. 右手側 (monokey_R) のビルド
      - name: Build Right
        uses: zmkfirmware/zmk-build-action@v2
        with:
          board: xiao_ble
          shield: monokey_R rgbled_adapter

      # 3. 左手側 (monokey_L) のビルド
      - name: Build Left
        uses: zmkfirmware/zmk-build-action@v2
        with:
          board: xiao_ble
          shield: monokey_L rgbled_adapter

      # 最後に成果物をアップロードしてダウンロード可能にします
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
