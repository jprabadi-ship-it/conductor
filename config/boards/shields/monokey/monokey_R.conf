CONFIG_ZMK_KEYBOARD_NAME="conductor"

# --- スプリット構成：右手（子機）の定義 ---
# これにより右手が自分自身でBluetooth IDを出すのを止め、ドングルを探すようになります
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
CONFIG_PMW3610_SMART_ALGORITHM=n

# --- 基本機能 ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_BLE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# --- トラックボール：pite1222版ドライバ（月曜日の完全復元） ---
# エラーの原因となるレイヤー切り替え機能（SMART_ALGORITHM）は削除しました
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=2000
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_0=y
CONFIG_PMW3610_SCROLL_TICK=30
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_INVERT_SCROLL_Y=n
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3260
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=100000

# --- ZMK Studio & その他機能 ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# バッテリーレポート設定
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# LED設定（レイヤー・バッテリー・充電）
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_7_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_8_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_9_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_10_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_11_COLOR=0

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=10
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=5
CONFIG_RGBLED_WIDGET_BATTERY_BLINK_MS=4000
CONFIG_RGBLED_WIDGET_CONN_BLINK_MS=800

CONFIG_CHARGE_INDICATOR=y
CONFIG_CHG_POLICY=n
CONFIG_CHG_BATTERY_LEVEL_BASED_COLOR=y
CONFIG_CHG_BATTERY_LEVEL_HIGH=50
CONFIG_CHG_BATTERY_LEVEL_LOW=10
CONFIG_CHG_BATTERY_LEVEL_CRITICAL=5
CONFIG_CHG_BATTERY_COLOR_HIGH=2
CONFIG_CHG_BATTERY_COLOR_MEDIUM=3
CONFIG_CHG_BATTERY_COLOR_LOW=1
CONFIG_CHG_BATTERY_COLOR_CRITICAL=5
CONFIG_CHG_BATTERY_COLOR_MISSING=0

# 通信最適化
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
