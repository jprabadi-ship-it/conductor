# --- 基本システム設定 ---
CONFIG_ZMK_KEYBOARD_NAME="conductor"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# --- 接続・通信設定 ---
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- 分割キーボード間のステータス共有 ---
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- マウス・ポインティング機能 (最優先) ---
# 新しいPointing機能を有効化し、古いMouse設定と共存させて互換性を確保
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_MOUSE=y

# --- パフォーマンス・安定性向上 ---
# 負荷軽減のためStudioとロギングは一旦オフ（必要時にyに戻してください）
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_USB_LOGGING=n

# LEDピンとの競合を防ぐための無効化設定
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_GPIO=y

# RGB系
# CONFIG_ZMK_RGB_UNDERGLOW=n

# --- RGBLEDウィジェットの有効化とレイヤーカラー設定 ---
# CONFIG_RGBLED_WIDGET=n
# CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

# お好みのレイヤーカラー設定（必要に応じて色番号を変更・追加してください）
# CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
# CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
# CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
# CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
# CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=5

# 通信状態の点滅設定（ドングルが左右と繋がっていない時に点滅して知らせます）
# CONFIG_RGBLED_WIDGET_CONN_BLINK_MS=800
