CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=y

# バッテリー状態のレポートを有効化
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# 🌟 充電状態・残量によるLED通知機能を有効化
CONFIG_CHARGE_INDICATOR=y

# 🌟 右手と同じ「色のしきい値」をセット（ここを揃えると挙動が一致します）
# 50%以上
CONFIG_CHARGE_INDICATOR_LEVEL_HIGH=50
# 10%〜49%
CONFIG_CHARGE_INDICATOR_LEVEL_MEDIUM=10
# 10%以下（Low）
CONFIG_CHARGE_INDICATOR_LEVEL_LOW=10
# 5%以下（Critical）
CONFIG_CHARGE_INDICATOR_LEVEL_CRITICAL=5
