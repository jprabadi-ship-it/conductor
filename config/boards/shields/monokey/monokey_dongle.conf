# --- 実機（左手）で動いているであろう基本設定 ---
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# --- ドングルとして動くための最小限の追加 ---
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
# ドングル（親機）は自分自身がUSBデバイスとして振る舞う
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# --- 古いブートローダーへの「おまじない」 ---
# USBの認識を確実にするため、あえて標準的なIDを明示する
CONFIG_USB_DEVICE_VID=0x1d50
CONFIG_USB_DEVICE_PID=0x615e
CONFIG_USB_DEVICE_MANUFACTURER="ZMK Project"

# 起動時のUSB認識失敗を避けるためのディレイ（重要）
CONFIG_ZMK_USB_BOOT=y
