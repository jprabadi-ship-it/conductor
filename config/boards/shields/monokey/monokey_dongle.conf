# --- 基本システム設定 ---
CONFIG_ZMK_KEYBOARD_NAME="conductor"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# --- 接続・通信設定 ---
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- 分割キーボード間のステータス共有 ---
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- マウス・ポインティング機能 (最優先) ---
# 新しいPointing機能を有効化し、古いMouse設定と共存させて互換性を確保
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# --- パフォーマンス・安定性向上 ---
# 負荷軽減のためStudioとロギングは一旦オフ（必要時にyに戻してください）
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_USB_LOGGING=n

# LEDピンとの競合を防ぐための無効化設定
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_GPIO=y

# --- 一時停止中の機能 (コメントアウト) ---
# LEDウィジェットはAMLとの競合解決まで眠らせます
# CONFIG_ZMK_RGBLED_WIDGET=y
# CONFIG_ZMK_RGBLED_WIDGET_INTERVAL_MS=250
