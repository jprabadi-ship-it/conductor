# 親機としての最小構成
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# USBスタックを「レガシー（古い）」モードに寄せる
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_BOOT=y
# 起動時のUSB列挙（Enumeration）を安定させるための強制ID
CONFIG_USB_DEVICE_VID=0x1d50
CONFIG_USB_DEVICE_PID=0x615e
CONFIG_USB_DEVICE_MANUFACTURER="ZMK"
CONFIG_ZMK_KEYBOARD_NAME="conductor"

# --- 0.6.1のための「軽量化」 ---
# 起動を遅らせる要因（Studio、ログ、バッテリー報告）をすべて切る
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USBの接続維持を優先
CONFIG_USB_HID_POLL_INTERVAL_MS=1
