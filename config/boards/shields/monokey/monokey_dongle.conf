# ドングル（セントラル）として動作させる
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# 接続する子機の数（左手と右手の計2台）を指定する
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# ドングルでバッテリー状況を監視できるようにする設定
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# 左右のキーボード＋PCとの接続を安定させるための同時接続数
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# マウス機能の有効化（ドングルがPCにマウスとして名乗るために必要）
CONFIG_ZMK_MOUSE=y

# バッテリー状況の集約設定
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# キーボード名の統一
CONFIG_ZMK_KEYBOARD_NAME="conductor"

# ZMK Studioの設定（ドングル経由で設定変更する場合）
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n
