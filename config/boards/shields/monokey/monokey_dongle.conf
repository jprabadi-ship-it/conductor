# 基本動作モード
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# USB機能を最優先
CONFIG_ZMK_USB=y

# 起動を邪魔する可能性のある要素を徹底排除
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_BATTERY_REPORTING=n

# 安定のためのBT接続数
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# マウス機能（これだけはトラボのために残す）
CONFIG_ZMK_MOUSE=y

# 名前を標準に戻してMacとの相性を確保
CONFIG_ZMK_KEYBOARD_NAME="conductor"
